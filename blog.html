<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog - Muhammad N.H. Khoiron</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        /* Menggunakan linear-gradient sebagai overlay warna slate-50 (90% opacity) agar teks tetap terbaca */
        background-image:
          linear-gradient(rgba(248, 250, 252, 0.9), rgba(248, 250, 252, 0.9)),
          url("background.jpg");
        background-size: cover; /* Memastikan gambar menutupi seluruh layar */
        background-position: center; /* Memusatkan posisi gambar */
        background-attachment: fixed; /* Membuat background tidak ikut scroll (efek parallax statis) */
        background-repeat: no-repeat; /* Mencegah gambar berulang */
      }
      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-800 antialiased flex flex-col min-h-screen"
  >
    <nav
      class="fixed w-full z-50 top-0 transition-all duration-300 backdrop-blur-md bg-white/70 border-b border-slate-200 shadow-sm"
    >
      <div
        class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center"
      >
        <div class="font-bold text-xl tracking-tighter text-slate-900">
          M<span class="text-blue-600">K.</span>
        </div>
        <div
          class="hidden md:flex space-x-8 text-sm font-semibold text-slate-600"
        >
          <a href="index.html" class="hover:text-blue-600 transition-colors"
            >Home</a
          >
          <a href="resume.html" class="hover:text-blue-600 transition-colors"
            >Resume</a
          >
          <a href="projects.html" class="hover:text-blue-600 transition-colors"
            >Projects</a
          >
          <a href="blog.html" class="text-blue-600">Blog</a>
        </div>
      </div>
    </nav>

    <main
      class="flex-grow flex flex-col items-center justify-center text-center px-6 pt-32 pb-20"
    >
      <div class="relative mb-8">
        <div
          class="absolute inset-0 bg-blue-100 rounded-full blur-xl opacity-60 animate-pulse"
        ></div>
        <div
          class="relative bg-white p-6 rounded-full shadow-lg border border-slate-100"
        >
          <svg
            class="w-16 h-16 text-blue-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"
            ></path>
          </svg>
        </div>
      </div>

      <h1 class="text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">
        Cooking Something Good!
      </h1>
      <p class="text-lg text-slate-500 max-w-md mx-auto mb-10 leading-relaxed">
        Halaman blog ini masih dalam tahap pengembangan. Segera hadir ruang
        untuk berbagi dokumentasi proyek dan catatan teknis.
      </p>

      <a
        href="index.html"
        class="inline-flex items-center gap-3 px-8 py-3.5 bg-slate-900 text-white font-semibold rounded-lg shadow-md hover:bg-blue-600 hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 19l-7-7m0 0l7-7m-7 7h18"
          ></path>
        </svg>
        Kembali ke Beranda
      </a>
    </main>
  </body>
</html>
